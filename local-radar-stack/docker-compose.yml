services:
  db:
    image: postgres:16-alpine
    container_name: radar-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - radar_net

  mqtt:
    image: eclipse-mosquitto:2
    container_name: radar-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - radar_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: radar-backend
    restart: unless-stopped
    depends_on:
      - db
      - mqtt
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MQTT_URL: ${MQTT_URL}
      MQTT_TOPIC: ${MQTT_TOPIC}
      RADAR_OFFLINE_SECONDS: ${RADAR_OFFLINE_SECONDS}
      DEBUG_MODE: ${DEBUG_MODE}
      ALLOW_TESTING_ROUTES: ${ALLOW_TESTING_ROUTES:-false}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    networks:
      - radar_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:4000}
    container_name: radar-dashboard
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    networks:
      - radar_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: radar-pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - radar_net

networks:
  radar_net:
    driver: bridge

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  pgadmin_data:
