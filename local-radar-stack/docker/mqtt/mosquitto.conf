# MQTT listener — bind to all interfaces so Docker port mapping works reliably
listener 1883 0.0.0.0
protocol mqtt

# WebSocket listener — for dashboard / browser-based MQTT clients
listener 9001 0.0.0.0
protocol websockets

allow_anonymous true
persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
