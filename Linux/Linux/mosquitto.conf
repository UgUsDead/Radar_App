# ── Mosquitto - optimised for low-latency real-time streaming ──

# Standard MQTT
listener 1883 0.0.0.0
protocol mqtt

# WebSocket for web dashboard
listener 9001 0.0.0.0
protocol websockets

# Anonymous (dev)
allow_anonymous true

# ── Performance tuning ─────────────────────────────────────────

# Do NOT persist messages to disk (kills latency on Jetson SD card)
persistence false

# Maximum in-flight QoS>0 messages per client (keep low)
max_inflight_messages 1

# Drop queued messages immediately when a client is slow
max_queued_messages 0